<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>We Masau Loan Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; margin-bottom: 20px; }
        .header { background: linear-gradient(120deg, #0b2b44 0%, #1c4e6f 100%); padding: 24px 20px; color: white; text-align: center; }
        .header h1 { font-size: 1.8rem; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 0.9rem; }
        .content { padding: 24px; }
        .form-section { margin-bottom: 24px; border-bottom: 1px solid #e2e8f0; padding-bottom: 20px; }
        .form-section h2 { color: #0f3b5f; font-size: 1.2rem; margin-bottom: 16px; }
        .form-row { display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 16px; }
        @media (min-width: 640px) { .form-row { grid-template-columns: 1fr 1fr; } }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 6px; color: #1e2f3e; font-size: 0.85rem; }
        .required { color: #e53e3e; }
        input, select, textarea { padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 14px; font-family: inherit; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #1c4e6f; }
        .checkbox-group { margin: 12px 0; }
        .checkbox-group label { display: flex; align-items: center; gap: 10px; font-weight: normal; cursor: pointer; }
        .checkbox-group input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
        .btn { padding: 12px 24px; border: none; border-radius: 40px; font-weight: 600; font-size: 14px; cursor: pointer; margin-right: 8px; margin-bottom: 8px; }
        .btn-primary { background: #1c4e6f; color: white; }
        .btn-admin { background: #b45309; color: white; }
        .status { margin-top: 16px; padding: 12px; border-radius: 12px; display: none; font-weight: 500; }
        .status.success { background: #c6f6d5; color: #22543d; display: block; }
        .status.error { background: #fed7d7; color: #742a2a; display: block; }
        .status.info { background: #bee3f8; color: #2c5282; display: block; }
        .admin-panel { display: none; }
        .admin-header { background: #1e293b; padding: 16px 20px; color: white; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .loan-card { background: #f8fafc; border-radius: 16px; padding: 16px; margin-bottom: 16px; border: 1px solid #e2e8f0; }
        .loan-card h4 { color: #0f3b5f; margin-bottom: 8px; }
        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: white; padding: 12px; border-radius: 12px; margin: 12px 0; font-size: 0.8rem; }
        .reply-toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .reply-toolbar select, .reply-toolbar textarea { flex: 1; min-width: 120px; font-size: 12px; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .badge-pending { background: #fef5e7; color: #c05621; }
        .badge-approved { background: #c6f6d5; color: #22543d; }
        .badge-rejected { background: #fed7d7; color: #742a2a; }
        .loading { text-align: center; padding: 40px; color: #718096; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; max-width: 400px; width: 100%; padding: 24px; border-radius: 24px; }
        footer { text-align: center; font-size: 0.7rem; color: rgba(255,255,255,0.8); margin-top: 20px; }
        @media (max-width: 640px) { .content { padding: 16px; } .btn { width: 100%; margin-right: 0; } }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1>📄 We Masau Loan Portal</h1>
            <p>Fast • Secure • 3 Approvals Required</p>
        </div>
        <div class="content">
            <form id="loanForm">
                <div class="form-section">
                    <h2>👤 Member Information</h2>
                    <div class="form-row">
                        <div class="form-group"><label>Full Name <span class="required">*</span></label><input type="text" id="fullName" required></div>
                        <div class="form-group"><label>Member ID <span class="required">*</span></label><input type="text" id="memberId" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Email <span class="required">*</span></label><input type="email" id="email" required></div>
                        <div class="form-group"><label>Phone <span class="required">*</span></label><input type="tel" id="phone" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Date of Joining <span class="required">*</span></label><input type="month" id="joinDate" required></div>
                        <div class="form-group"><label>Membership Status</label><select id="membershipStatus"><option>Regular</option><option>New</option><option>Veteran</option></select></div>
                    </div>
                </div>
                
                <div class="form-section">
                    <h2>💰 Loan Request</h2>
                    <div class="form-row">
                        <div class="form-group"><label>Loan Type <span class="required">*</span></label><select id="loanType" required><option>Business Expansion</option><option>Education</option><option>Medical Emergency</option><option>Home Improvement</option><option>Debt Consolidation</option><option>Agricultural</option><option>Other</option></select></div>
                        <div class="form-group" id="otherLoanGroup" style="display:none;"><label>Specify Purpose</label><input type="text" id="otherLoanType"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Loan Amount (MWK) <span class="required">*</span></label><input type="number" id="loanAmount" step="1000" required></div>
                        <div class="form-group"><label>Loan Term (months) <span class="required">*</span></label><select id="loanTerm" required><option value="1">1 month</option><option value="2">2 months</option><option value="3">3 months</option><option value="4">4 months</option><option value="5">5 months</option><option value="6">6 months</option></select></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Repayment Method</label><select id="repaymentMethod"><option>Monthly Bank Transfer/Salary</option><option>Monthly Bank Transfer Business Income</option><option>Direct Bank Deposit</option></select></div>
                        <div class="form-group"><label>Disbursement Date <span class="required">*</span></label><input type="date" id="disbursementDate" required></div>
                    </div>
                    <div class="form-group">
                        <label>Purpose <span class="required">*</span> (min 50 characters)</label>
                        <textarea id="purpose" rows="3" required placeholder="Please describe in detail how you will use this loan (minimum 50 characters)..."></textarea>
                        <small id="purposeWarning" style="color:#d97706; display:none;"></small>
                    </div>
                </div>
                
                <div class="form-section">
                    <h2>📊 Financial Snapshot</h2>
                    <div class="form-row">
                        <div class="form-group"><label>Monthly Income (MWK) <span class="required">*</span></label><input type="number" id="monthlyIncome" step="1000" required></div>
                        <div class="form-group"><label>Monthly Expenses (MWK) <span class="required">*</span></label><input type="number" id="monthlyExpenses" step="1000" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Employment Status</label><select id="employmentStatus"><option>Full-time</option><option>Self-employed</option><option>Business Owner</option><option>Contract</option><option>Retired</option></select></div>
                        <div class="form-group"><label>Employer/Business</label><input type="text" id="employer"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Years in Role</label><input type="number" id="yearsEmployed" step="0.5"></div>
                        <div class="form-group"><label>Existing Loans?</label><select id="existingLoans"><option>No</option><option>Yes</option></select></div>
                        <div class="form-group" id="existingBalanceGroup" style="display:none;"><label>Outstanding Balance (MWK)</label><input type="number" id="existingBalance" step="1000"></div>
                    </div>
                </div>
                
                <div class="form-section">
                    <h2>🤝 Guarantors</h2>
                    <div class="form-row">
                        <div class="form-group"><label>Guarantor 1 Name <span class="required">*</span></label><input type="text" id="guarantor1Name" required></div>
                        <div class="form-group"><label>Phone <span class="required">*</span></label><input type="tel" id="guarantor1Phone" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Guarantor 2 Name <span class="required">*</span></label><input type="text" id="guarantor2Name" required></div>
                        <div class="form-group"><label>Phone <span class="required">*</span></label><input type="tel" id="guarantor2Phone" required></div>
                    </div>
                </div>
                
                <div class="form-section">
                    <h2>📜 Terms & Conditions</h2>
                    <div class="checkbox-group"><label><input type="checkbox" id="agreeTerms" required> I confirm all information is true and correct</label></div>
                    <div class="checkbox-group"><label><input type="checkbox" id="agreeVerification" required> I authorize verification of my information</label></div>
                    <div class="checkbox-group"><label><input type="checkbox" id="agreePolicy" required> I agree to the loan terms & conditions</label></div>
                </div>
                
                <div style="display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px;">
                    <button type="button" id="submitBtn" class="btn btn-primary">📨 Submit Application</button>
                    <button type="button" id="toggleAdminBtn" class="btn btn-admin">🔐 Admin Panel</button>
                </div>
                <div id="formStatus" class="status"></div>
            </form>
        </div>
    </div>
    
    <div id="adminPanel" class="card admin-panel">
        <div class="admin-header">
            <h3>📋 Loan Applications</h3>
            <div style="display: flex; gap: 8px;">
                <span id="loggedInUser" style="font-size: 0.8rem;"></span>
                <button id="refreshAdminBtn" class="btn" style="padding: 6px 12px; font-size: 12px;">🔄 Refresh</button>
                <button id="logoutBtn" class="btn" style="padding: 6px 12px; font-size: 12px;">🚪 Logout</button>
            </div>
        </div>
        <div class="content">
            <div id="applicationsList">Loading...</div>
        </div>
    </div>
    
    <footer>We Masau SACCO • Multi-approval system (3 approvals required)</footer>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h3>🔐 Committee Login</h3>
        <label>Username</label>
        <input type="text" id="loginUsername" placeholder="Enter username">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password">
        <div id="loginError" style="color: red; font-size: 0.8rem; margin-top: 8px;"></div>
        <div style="margin-top: 20px; display: flex; gap: 12px;">
            <button id="loginBtn" class="btn btn-primary" style="flex:1;">Login</button>
            <button id="closeLoginBtn" class="btn btn-secondary" style="flex:1;">Cancel</button>
        </div>
    </div>
</div>

<script>
    // ===== CONFIGURATION =====
    const API_URL = "https://script.google.com/macros/s/AKfycbzXnR0VBoBBCzkvkkYJhrCId5PciYFOTxbMQgy7AVyPrW-0hFN0lMyHg04IFqVc_S6A/exec";
    const API_PASSWORD = "WeMasau2026!";
    
    let currentAdmin = null;
    let allApplications = [];
    let callbackCounter = 0;
    
    function showStatus(message, type, elementId = "formStatus") {
        const el = document.getElementById(elementId);
        if (el) {
            el.textContent = message;
            el.className = `status ${type}`;
            setTimeout(() => { if (el) el.className = "status"; }, 4000);
        }
    }
    
    function formatNumber(num) { return num ? parseInt(num).toLocaleString() : "0"; }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === "&") return "&amp;";
            if (m === "<") return "&lt;";
            if (m === ">") return "&gt;";
            return m;
        });
    }
    
    function jsonpRequest(action, data, callback) {
        const callbackName = `jsonp_callback_${Date.now()}_${callbackCounter++}`;
        const url = new URL(API_URL);
        url.searchParams.set('action', action);
        url.searchParams.set('data', JSON.stringify(data));
        url.searchParams.set('callback', callbackName);
        
        console.log(`📤 JSONP Request - Action: ${action}`, data);
        
        const script = document.createElement('script');
        script.src = url.toString();
        
        const timeout = setTimeout(() => {
            if (window[callbackName]) {
                delete window[callbackName];
                script.remove();
                callback({ error: "Request timeout" });
            }
        }, 30000);
        
        window[callbackName] = function(response) {
            console.log(`📥 JSONP Response - Action: ${action}`, response);
            clearTimeout(timeout);
            delete window[callbackName];
            script.remove();
            callback(response);
        };
        
        script.onerror = function() {
            clearTimeout(timeout);
            delete window[callbackName];
            script.remove();
            callback({ error: "Network error" });
        };
        
        document.head.appendChild(script);
    }
    
    async function callAPI(action, data = {}) {
        return new Promise((resolve, reject) => {
            jsonpRequest(action, data, (response) => {
                if (response.error) reject(new Error(response.error));
                else resolve(response);
            });
        });
    }
    
    document.getElementById("submitBtn").onclick = async () => {
        // Validate terms
        if (!document.getElementById("agreeTerms").checked ||
            !document.getElementById("agreeVerification").checked ||
            !document.getElementById("agreePolicy").checked) {
            showStatus("Please accept all terms", "error");
            return;
        }
        
        const purpose = document.getElementById("purpose").value.trim();
        if (purpose.length < 50) {
            showStatus(`Purpose must be at least 50 characters (currently ${purpose.length})`, "error");
            return;
        }
        
        let loanType = document.getElementById("loanType").value;
        if (loanType === "Other") {
            const otherSpec = document.getElementById("otherLoanType").value.trim();
            loanType = otherSpec ? `Other: ${otherSpec}` : "Other";
        }
        
        const appData = {
            fullName: document.getElementById("fullName").value.trim(),
            memberId: document.getElementById("memberId").value.trim(),
            email: document.getElementById("email").value.trim(),
            phone: document.getElementById("phone").value.trim(),
            joinDate: document.getElementById("joinDate").value,
            membershipStatus: document.getElementById("membershipStatus").value,
            loanType: loanType,
            loanAmount: document.getElementById("loanAmount").value,
            loanTerm: document.getElementById("loanTerm").value,
            repaymentMethod: document.getElementById("repaymentMethod").value,
            disbursementDate: document.getElementById("disbursementDate").value,
            purpose: purpose,
            monthlyIncome: document.getElementById("monthlyIncome").value,
            monthlyExpenses: document.getElementById("monthlyExpenses").value,
            employmentStatus: document.getElementById("employmentStatus").value,
            employer: document.getElementById("employer").value,
            yearsEmployed: document.getElementById("yearsEmployed").value,
            existingLoans: document.getElementById("existingLoans").value,
            existingBalance: document.getElementById("existingLoans").value === "Yes" ? document.getElementById("existingBalance").value : "",
            guarantor1Name: document.getElementById("guarantor1Name").value.trim(),
            guarantor1Phone: document.getElementById("guarantor1Phone").value.trim(),
            guarantor2Name: document.getElementById("guarantor2Name").value.trim(),
            guarantor2Phone: document.getElementById("guarantor2Phone").value.trim()
        };
        
        console.log("📝 Submitting application:", appData);
        
        try {
            const result = await callAPI("saveLoan", { appData });
            if (result.success) {
                showStatus("✅ " + result.message, "success");
                document.getElementById("loanForm").reset();
                document.getElementById("otherLoanGroup").style.display = "none";
                document.getElementById("existingBalanceGroup").style.display = "none";
                console.log("✅ Submission successful!");
            } else {
                showStatus("❌ Error: " + result.error, "error");
                console.error("❌ Submission failed:", result.error);
            }
        } catch (error) {
            showStatus("❌ Error: " + error.message, "error");
            console.error("❌ Exception:", error);
        }
    };
    
    async function loadApplications() {
        if (!currentAdmin) return;
        console.log("📋 Loading applications...");
        try {
            const result = await callAPI("getLoans", { password: API_PASSWORD });
            if (result.success) {
                allApplications = result.loans || [];
                console.log(`✅ Loaded ${allApplications.length} applications`);
                const container = document.getElementById("applicationsList");
                if (!allApplications.length) {
                    container.innerHTML = '<div class="loading">✨ No applications yet</div>';
                    return;
                }
                let html = "";
                allApplications.forEach((app, idx) => {
                    const status = app.approvalStatus || "Pending";
                    const approvalCount = app.approvalCount || 0;
                    let statusClass = "badge-pending";
                    if (status === "Approved") statusClass = "badge-approved";
                    if (status === "Rejected") statusClass = "badge-rejected";
                    html += `<div class="loan-card">
                        <div style="display: flex; justify-content: space-between;">
                            <h4>👤 ${escapeHtml(app.fullName) || "Unknown"}</h4>
                            <span class="badge ${statusClass}">${status} (${approvalCount}/3)</span>
                        </div>
                        <div class="details-grid">
                            <span>📧 ${escapeHtml(app.email) || "No email"}</span>
                            <span>💰 MWK ${formatNumber(app.loanAmount) || "0"}</span>
                        </div>`;
                    if (status !== "Approved" && status !== "Rejected") {
                        html += `<div class="reply-toolbar">
                            <select id="decision-${idx}">
                                <option value="Approve">✅ Approve</option>
                                <option value="Reject">❌ Reject</option>
                            </select>
                            <textarea id="remarks-${idx}" placeholder="Committee remarks..." rows="1"></textarea>
                            <button onclick="handleDecision(${idx})" class="btn btn-primary">Submit</button>
                        </div>`;
                    }
                    html += `<div id="status-${idx}" style="font-size: 12px; margin-top: 8px;"></div></div>`;
                });
                container.innerHTML = html;
            } else {
                console.error("❌ Load failed:", result.error);
                document.getElementById("applicationsList").innerHTML = '<div class="loading">❌ ' + escapeHtml(result.error) + '</div>';
            }
        } catch (error) {
            console.error("❌ Exception loading:", error);
            document.getElementById("applicationsList").innerHTML = '<div class="loading">❌ Failed to load</div>';
        }
    }
    
    window.handleDecision = async function(idx) {
        const app = allApplications[idx];
        const decision = document.getElementById(`decision-${idx}`).value;
        const remarks = document.getElementById(`remarks-${idx}`).value;
        if (!remarks) { showStatus("Please enter remarks", "error", `status-${idx}`); return; }
        const statusDiv = document.getElementById(`status-${idx}`);
        statusDiv.innerHTML = '<span style="color: blue;">⏳ Processing...</span>';
        try {
            const result = await callAPI("addApproval", {
                applicationId: app.applicationId,
                approverName: currentAdmin.name,
                approverRole: currentAdmin.role,
                decision: decision,
                remarks: remarks
            });
            if (result.success) {
                statusDiv.innerHTML = `<span style="color: green;">✅ ${result.message}</span>`;
                await loadApplications();
            } else {
                statusDiv.innerHTML = `<span style="color: red;">❌ ${result.error}</span>`;
            }
        } catch (error) {
            statusDiv.innerHTML = `<span style="color: red;">❌ ${error.message}</span>`;
        }
    };
    
    const committeeMembers = [
        { username: "harry", password: "chair26", name: "Harry Mononga", role: "Chairman" },
        { username: "marvin", password: "treas26", name: "Marvin Masangwi", role: "Treasurer" },
        { username: "emmanuel", password: "masau2026", name: "Emmanuel Kusunzi", role: "Member" },
        { username: "levie", password: "masau2026", name: "Levie Sezza", role: "Member" },
        { username: "amos", password: "patron26", name: "Amos Tizora", role: "Patron" }
    ];
    
    document.getElementById("toggleAdminBtn").onclick = () => { document.getElementById("loginModal").style.display = "flex"; };
    document.getElementById("closeLoginBtn").onclick = () => { document.getElementById("loginModal").style.display = "none"; document.getElementById("loginError").textContent = ""; };
    document.getElementById("loginBtn").onclick = () => {
        const username = document.getElementById("loginUsername").value.toLowerCase();
        const password = document.getElementById("loginPassword").value;
        const user = committeeMembers.find(u => u.username === username && u.password === password);
        if (user) {
            currentAdmin = user;
            document.getElementById("loginModal").style.display = "none";
            document.getElementById("adminPanel").style.display = "block";
            document.getElementById("loggedInUser").innerHTML = `👤 ${user.name} (${user.role})`;
            loadApplications();
        } else {
            document.getElementById("loginError").textContent = "Invalid username or password";
        }
    };
    document.getElementById("logoutBtn").onclick = () => { currentAdmin = null; document.getElementById("adminPanel").style.display = "none"; showStatus("Logged out", "info"); };
    document.getElementById("refreshAdminBtn").onclick = () => { if (currentAdmin) loadApplications(); };
    
    document.getElementById("loanType").onchange = function() { document.getElementById("otherLoanGroup").style.display = this.value === "Other" ? "block" : "none"; };
    document.getElementById("existingLoans").onchange = function() { document.getElementById("existingBalanceGroup").style.display = this.value === "Yes" ? "block" : "none"; };
    document.getElementById("purpose").oninput = function() {
        const warn = document.getElementById("purposeWarning");
        const len = this.value.length;
        if (len > 0 && len < 50) {
            warn.style.display = "inline-block";
            warn.innerHTML = `⚠️ ${len}/50 characters minimum (need ${50 - len} more)`;
        } else {
            warn.style.display = "none";
        }
    };
    
    const today = new Date().toISOString().split("T")[0];
    document.getElementById("disbursementDate").setAttribute("min", today);
    
    console.log("✅ Page loaded - We Masau Loan Portal Ready");
    console.log("📡 API URL:", API_URL);
    showStatus("System ready. Please fill out the form.", "info");
</script>
</body>
</html>
