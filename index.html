<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>We Masau SACCO - Loan Application Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .form-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .form-section h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 100%;
            margin-top: 20px;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .alert.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }
            
            .form-section {
                padding: 20px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏦 We Masau SACCO</h1>
            <p>Loan Application Portal</p>
        </div>
        
        <div class="content">
            <div id="alert" class="alert"></div>
            
            <form id="loanForm" class="loan-form">
                <div class="form-section">
                    <h2>Personal Information</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Full Name *</label>
                            <input type="text" id="fullName" required>
                        </div>
                        <div class="form-group">
                            <label>Member ID *</label>
                            <input type="text" id="memberId" required>
                        </div>
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" id="email" required>
                        </div>
                        <div class="form-group">
                            <label>Phone Number *</label>
                            <input type="tel" id="phone" required>
                        </div>
                        <div class="form-group">
                            <label>Join Date *</label>
                            <input type="date" id="joinDate" required>
                        </div>
                        <div class="form-group">
                            <label>Membership Status *</label>
                            <select id="membershipStatus" required>
                                <option value="">Select...</option>
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                                <option value="Suspended">Suspended</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Loan Details</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Loan Type *</label>
                            <select id="loanType" required>
                                <option value="">Select...</option>
                                <option value="Emergency">Emergency Loan</option>
                                <option value="Education">Education Loan</option>
                                <option value="Business">Business Loan</option>
                                <option value="Housing">Housing Loan</option>
                                <option value="Vehicle">Vehicle Loan</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Loan Amount (MWK) *</label>
                            <input type="number" id="loanAmount" required>
                        </div>
                        <div class="form-group">
                            <label>Loan Term (months) *</label>
                            <select id="loanTerm" required>
                                <option value="">Select...</option>
                                <option value="3">3 months</option>
                                <option value="6">6 months</option>
                                <option value="12">12 months</option>
                                <option value="24">24 months</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Repayment Method *</label>
                            <select id="repaymentMethod" required>
                                <option value="">Select...</option>
                                <option value="Monthly">Monthly</option>
                                <option value="Bi-weekly">Bi-weekly</option>
                                <option value="Weekly">Weekly</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Preferred Disbursement Date</label>
                            <input type="date" id="disbursementDate">
                        </div>
                        <div class="form-group">
                            <label>Loan Purpose *</label>
                            <textarea id="purpose" required placeholder="Briefly explain the purpose of this loan..."></textarea>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Financial Information</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Monthly Income (MWK) *</label>
                            <input type="number" id="monthlyIncome" required>
                        </div>
                        <div class="form-group">
                            <label>Monthly Expenses (MWK) *</label>
                            <input type="number" id="monthlyExpenses" required>
                        </div>
                        <div class="form-group">
                            <label>Employment Status *</label>
                            <select id="employmentStatus" required>
                                <option value="">Select...</option>
                                <option value="Employed">Employed</option>
                                <option value="Self-Employed">Self-Employed</option>
                                <option value="Business Owner">Business Owner</option>
                                <option value="Unemployed">Unemployed</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Employer/Business Name</label>
                            <input type="text" id="employer">
                        </div>
                        <div class="form-group">
                            <label>Years Employed</label>
                            <input type="number" id="yearsEmployed" step="0.5">
                        </div>
                        <div class="form-group">
                            <label>Existing Loans?</label>
                            <select id="existingLoans">
                                <option value="No">No</option>
                                <option value="Yes">Yes</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Existing Loan Balance (if any)</label>
                            <input type="number" id="existingBalance">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Guarantor Information</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Guarantor 1 Name *</label>
                            <input type="text" id="guarantor1Name" required>
                        </div>
                        <div class="form-group">
                            <label>Guarantor 1 Phone *</label>
                            <input type="tel" id="guarantor1Phone" required>
                        </div>
                        <div class="form-group">
                            <label>Guarantor 2 Name *</label>
                            <input type="text" id="guarantor2Name" required>
                        </div>
                        <div class="form-group">
                            <label>Guarantor 2 Phone *</label>
                            <input type="tel" id="guarantor2Phone" required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    Submit Application
                </button>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Submitting application...</p>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Configuration
        const API_URL = "https://script.google.com/macros/s/AKfycbwCwKGV9Dg60eQS_-oPbovnnqbEuWxzIH0W9ceCrXkeiavGqXKI8xSvgtVbh8W_Yfrx/exec";
        
        console.log('✅ Page loaded - We Masau Loan Portal Ready');
        console.log('📡 API URL:', API_URL);
        
        // Get DOM elements
        const form = document.getElementById('loanForm');
        const submitBtn = document.getElementById('submitBtn');
        const loadingDiv = document.getElementById('loading');
        const alertDiv = document.getElementById('alert');
        
        // Helper function to show alerts
        function showAlert(message, type = 'info') {
            alertDiv.className = `alert ${type}`;
            alertDiv.innerHTML = message;
            alertDiv.style.display = 'block';
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }
        
        // Helper function to hide alert
        function hideAlert() {
            alertDiv.style.display = 'none';
        }
        
        // Helper function to validate form
        function validateForm(data) {
            const required = ['fullName', 'memberId', 'email', 'phone', 'joinDate', 'membershipStatus', 
                            'loanType', 'loanAmount', 'loanTerm', 'repaymentMethod', 'purpose', 
                            'monthlyIncome', 'monthlyExpenses', 'employmentStatus', 'guarantor1Name', 
                            'guarantor1Phone', 'guarantor2Name', 'guarantor2Phone'];
            
            for (let field of required) {
                if (!data[field] || data[field].toString().trim() === '') {
                    showAlert(`Please fill in ${field.replace(/([A-Z])/g, ' $1').toLowerCase()}`, 'error');
                    return false;
                }
            }
            
            // Validate email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(data.email)) {
                showAlert('Please enter a valid email address', 'error');
                return false;
            }
            
            // Validate phone (Malawi format)
            const phoneRegex = /^(\+265|0)[1-9]\d{7,8}$/;
            if (!phoneRegex.test(data.phone)) {
                showAlert('Please enter a valid phone number (e.g., 0999123456 or +265999123456)', 'error');
                return false;
            }
            
            // Validate loan amount
            if (parseFloat(data.loanAmount) < 50000) {
                showAlert('Minimum loan amount is MWK 50,000', 'error');
                return false;
            }
            
            if (parseFloat(data.loanAmount) > 10000000) {
                showAlert('Maximum loan amount is MWK 10,000,000', 'error');
                return false;
            }
            
            // Validate income vs expenses
            if (parseFloat(data.monthlyExpenses) >= parseFloat(data.monthlyIncome)) {
                showAlert('Monthly expenses must be less than monthly income', 'error');
                return false;
            }
            
            return true;
        }
        
        // Helper function to get form data
        function getFormData() {
            return {
                fullName: document.getElementById('fullName').value,
                memberId: document.getElementById('memberId').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                joinDate: document.getElementById('joinDate').value,
                membershipStatus: document.getElementById('membershipStatus').value,
                loanType: document.getElementById('loanType').value,
                loanAmount: document.getElementById('loanAmount').value,
                loanTerm: document.getElementById('loanTerm').value,
                repaymentMethod: document.getElementById('repaymentMethod').value,
                disbursementDate: document.getElementById('disbursementDate').value || '',
                purpose: document.getElementById('purpose').value,
                monthlyIncome: document.getElementById('monthlyIncome').value,
                monthlyExpenses: document.getElementById('monthlyExpenses').value,
                employmentStatus: document.getElementById('employmentStatus').value,
                employer: document.getElementById('employer').value || '',
                yearsEmployed: document.getElementById('yearsEmployed').value || '',
                existingLoans: document.getElementById('existingLoans').value,
                existingBalance: document.getElementById('existingBalance').value || '0',
                guarantor1Name: document.getElementById('guarantor1Name').value,
                guarantor1Phone: document.getElementById('guarantor1Phone').value,
                guarantor2Name: document.getElementById('guarantor2Name').value,
                guarantor2Phone: document.getElementById('guarantor2Phone').value
            };
        }
        
        // Helper function to reset form
        function resetForm() {
            form.reset();
            // Set default values for selects
            document.getElementById('existingLoans').value = 'No';
        }
        
        // Function to submit data using POST with CORS
        async function submitApplication(data) {
            console.log('📝 Submitting application:', data);
            
            try {
                // Method 1: Using POST with fetch (recommended)
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'saveLoan',
                        appData: data
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                console.log('✅ Server response:', result);
                return result;
                
            } catch (fetchError) {
                console.log('POST fetch failed, trying GET method...', fetchError);
                
                // Method 2: Fallback to GET with JSONP
                return new Promise((resolve, reject) => {
                    const callbackName = 'jsonp_callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
                    const script = document.createElement('script');
                    
                    // Setup timeout
                    const timeout = setTimeout(() => {
                        if (window[callbackName]) {
                            delete window[callbackName];
                        }
                        if (script.parentNode) {
                            script.parentNode.removeChild(script);
                        }
                        reject(new Error('Request timeout - Please check your internet connection'));
                    }, 30000);
                    
                    // Create callback function
                    window[callbackName] = function(response) {
                        clearTimeout(timeout);
                        delete window[callbackName];
                        if (script.parentNode) {
                            script.parentNode.removeChild(script);
                        }
                        resolve(response);
                    };
                    
                    // Build URL with parameters
                    const params = new URLSearchParams({
                        action: 'saveLoan',
                        callback: callbackName,
                        data: JSON.stringify(data)
                    });
                    
                    script.src = `${API_URL}?${params.toString()}`;
                    script.onerror = function() {
                        clearTimeout(timeout);
                        delete window[callbackName];
                        if (script.parentNode) {
                            script.parentNode.removeChild(script);
                        }
                        reject(new Error('Network error - Unable to connect to server'));
                    };
                    
                    document.head.appendChild(script);
                });
            }
        }
        
        // Form submission handler
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();
            
            // Get and validate form data
            const formData = getFormData();
            
            if (!validateForm(formData)) {
                return;
            }
            
            // Disable submit button and show loading
            submitBtn.disabled = true;
            loadingDiv.classList.add('active');
            
            try {
                // Submit application
                const result = await submitApplication(formData);
                
                console.log('Submission result:', result);
                
                if (result.success) {
                    // Show success message
                    showAlert(`
                        ✅ <strong>Application Submitted Successfully!</strong><br>
                        Your Application ID: <strong>${result.applicationId}</strong><br>
                        You will receive a confirmation email shortly.<br>
                        Please save your Application ID for future reference.
                    `, 'success');
                    
                    // Reset form
                    resetForm();
                    
                    // Scroll to top to show success message
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    
                } else {
                    // Show error message
                    showAlert(`
                        ❌ <strong>Submission Failed</strong><br>
                        ${result.error || 'An error occurred while submitting your application. Please try again.'}
                    `, 'error');
                }
                
            } catch (error) {
                console.error('❌ Exception:', error);
                showAlert(`
                    ❌ <strong>Network Error</strong><br>
                    Unable to submit application. Please check your internet connection and try again.<br>
                    Error: ${error.message}
                `, 'error');
            } finally {
                // Re-enable submit button and hide loading
                submitBtn.disabled = false;
                loadingDiv.classList.remove('active');
            }
        });
        
        // Add input validation for numeric fields
        document.getElementById('monthlyIncome').addEventListener('input', function() {
            if (this.value < 0) this.value = 0;
        });
        
        document.getElementById('monthlyExpenses').addEventListener('input', function() {
            if (this.value < 0) this.value = 0;
        });
        
        document.getElementById('loanAmount').addEventListener('input', function() {
            if (this.value < 50000) {
                this.setCustomValidity('Minimum loan amount is MWK 50,000');
            } else if (this.value > 10000000) {
                this.setCustomValidity('Maximum loan amount is MWK 10,000,000');
            } else {
                this.setCustomValidity('');
            }
        });
        
        // Phone number formatting hint
        document.getElementById('phone').addEventListener('input', function() {
            const phone = this.value;
            if (phone && !phone.match(/^(\+265|0)[1-9]\d{7,8}$/)) {
                this.setCustomValidity('Enter valid Malawi phone (e.g., 0999123456 or +265999123456)');
            } else {
                this.setCustomValidity('');
            }
        });
        
        console.log('✅ Event listeners configured - Ready for submissions');
    </script>
</body>
</html>
