<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>We Masau SACCO - Loan Application Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .form-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .form-section h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 100%;
            margin-top: 20px;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .alert.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }
            
            .form-section {
                padding: 20px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏦 We Masau SACCO</h1>
            <p>Loan Application Portal</p>
        </div>
        
        <div class="content">
            <div id="alert" class="alert"></div>
            
            <form id="loanForm" class="loan-form">
                <div class="form-section">
                    <h2>Personal Information</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Full Name *</label>
                            <input type="text" id="fullName" required>
                        </div>
                        <div class="form-group">
                            <label>Member ID *</label>
                            <input type="text" id="memberId" required>
                        </div>
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" id="email" required>
                        </div>
                        <div class="form-group">
                            <label>Phone Number *</label>
                            <input type="tel" id="phone" required placeholder="0999123456 or +265999123456">
                        </div>
                        <div class="form-group">
                            <label>Join Date *</label>
                            <input type="date" id="joinDate" required>
                        </div>
                        <div class="form-group">
                            <label>Membership Status *</label>
                            <select id="membershipStatus" required>
                                <option value="">Select...</option>
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                                <option value="Suspended">Suspended</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Loan Details</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Loan Type *</label>
                            <select id="loanType" required>
                                <option value="">Select...</option>
                                <option value="Emergency">Emergency Loan</option>
                                <option value="Education">Education Loan</option>
                                <option value="Business">Business Loan</option>
                                <option value="Housing">Housing Loan</option>
                                <option value="Vehicle">Vehicle Loan</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Loan Amount (MWK) *</label>
                            <input type="number" id="loanAmount" required min="50000" max="10000000">
                        </div>
                        <div class="form-group">
                            <label>Loan Term (months) *</label>
                            <select id="loanTerm" required>
                                <option value="">Select...</option>
                                <option value="3">3 months</option>
                                <option value="6">6 months</option>
                                <option value="12">12 months</option>
                                <option value="24">24 months</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Repayment Method *</label>
                            <select id="repaymentMethod" required>
                                <option value="">Select...</option>
                                <option value="Monthly">Monthly</option>
                                <option value="Bi-weekly">Bi-weekly</option>
                                <option value="Weekly">Weekly</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Preferred Disbursement Date</label>
                            <input type="date" id="disbursementDate">
                        </div>
                        <div class="form-group">
                            <label>Loan Purpose *</label>
                            <textarea id="purpose" required placeholder="Briefly explain the purpose of this loan..."></textarea>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Financial Information</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Monthly Income (MWK) *</label>
                            <input type="number" id="monthlyIncome" required min="0">
                        </div>
                        <div class="form-group">
                            <label>Monthly Expenses (MWK) *</label>
                            <input type="number" id="monthlyExpenses" required min="0">
                        </div>
                        <div class="form-group">
                            <label>Employment Status *</label>
                            <select id="employmentStatus" required>
                                <option value="">Select...</option>
                                <option value="Employed">Employed</option>
                                <option value="Self-Employed">Self-Employed</option>
                                <option value="Business Owner">Business Owner</option>
                                <option value="Unemployed">Unemployed</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Employer/Business Name</label>
                            <input type="text" id="employer">
                        </div>
                        <div class="form-group">
                            <label>Years Employed</label>
                            <input type="number" id="yearsEmployed" step="0.5" min="0">
                        </div>
                        <div class="form-group">
                            <label>Existing Loans?</label>
                            <select id="existingLoans">
                                <option value="No">No</option>
                                <option value="Yes">Yes</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Existing Loan Balance (if any)</label>
                            <input type="number" id="existingBalance" min="0">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Guarantor Information</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Guarantor 1 Name *</label>
                            <input type="text" id="guarantor1Name" required>
                        </div>
                        <div class="form-group">
                            <label>Guarantor 1 Phone *</label>
                            <input type="tel" id="guarantor1Phone" required placeholder="0999123456">
                        </div>
                        <div class="form-group">
                            <label>Guarantor 2 Name *</label>
                            <input type="text" id="guarantor2Name" required>
                        </div>
                        <div class="form-group">
                            <label>Guarantor 2 Phone *</label>
                            <input type="tel" id="guarantor2Phone" required placeholder="0999123456">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    Submit Application
                </button>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Submitting application...</p>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ============================================
        // SHEETY CONFIGURATION
        // ============================================
        // TODO: Replace this with your actual Sheety API URL
        // Get it from https://sheety.co after creating your project
        const SHEETY_API_URL = "https://api.sheety.co/YOUR_PROJECT_ID/YOUR_SHEET_NAME/Sheet1";
        
        // Your Google Sheet name (tab name) - change if your sheet has a different name
        const SHEET_NAME = "Sheet1";
        
        console.log('✅ Page loaded - We Masau Loan Portal Ready');
        console.log('📡 Sheety API URL:', SHEETY_API_URL);
        
        // DOM Elements
        const form = document.getElementById('loanForm');
        const submitBtn = document.getElementById('submitBtn');
        const loadingDiv = document.getElementById('loading');
        const alertDiv = document.getElementById('alert');
        
        function showAlert(message, type = 'info') {
            alertDiv.className = `alert ${type}`;
            alertDiv.innerHTML = message;
            alertDiv.style.display = 'block';
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }
        
        function hideAlert() {
            alertDiv.style.display = 'none';
        }
        
        function getFormData() {
            return {
                timestamp: new Date().toISOString(),
                applicationId: "WM-" + Date.now() + "-" + Math.random().toString(36).substr(2, 6).toUpperCase(),
                fullName: document.getElementById('fullName').value,
                memberId: document.getElementById('memberId').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                joinDate: document.getElementById('joinDate').value,
                membershipStatus: document.getElementById('membershipStatus').value,
                loanType: document.getElementById('loanType').value,
                loanAmount: document.getElementById('loanAmount').value,
                loanTerm: document.getElementById('loanTerm').value,
                repaymentMethod: document.getElementById('repaymentMethod').value,
                disbursementDate: document.getElementById('disbursementDate').value || '',
                purpose: document.getElementById('purpose').value,
                monthlyIncome: document.getElementById('monthlyIncome').value,
                monthlyExpenses: document.getElementById('monthlyExpenses').value,
                employmentStatus: document.getElementById('employmentStatus').value,
                employer: document.getElementById('employer').value || '',
                yearsEmployed: document.getElementById('yearsEmployed').value || '',
                existingLoans: document.getElementById('existingLoans').value,
                existingBalance: document.getElementById('existingBalance').value || '0',
                guarantor1Name: document.getElementById('guarantor1Name').value,
                guarantor1Phone: document.getElementById('guarantor1Phone').value,
                guarantor2Name: document.getElementById('guarantor2Name').value,
                guarantor2Phone: document.getElementById('guarantor2Phone').value,
                approvalCount: 0,
                approvalStatus: "Pending",
                approvals: "[]",
                rejectionReason: ""
            };
        }
        
        function validateForm(data) {
            const required = ['fullName', 'memberId', 'email', 'phone', 'joinDate', 'membershipStatus', 
                            'loanType', 'loanAmount', 'loanTerm', 'repaymentMethod', 'purpose', 
                            'monthlyIncome', 'monthlyExpenses', 'employmentStatus', 'guarantor1Name', 
                            'guarantor1Phone', 'guarantor2Name', 'guarantor2Phone'];
            
            for (let field of required) {
                if (!data[field] || data[field].toString().trim() === '') {
                    showAlert(`Please fill in ${field.replace(/([A-Z])/g, ' $1').toLowerCase()}`, 'error');
                    return false;
                }
            }
            
            // Validate email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(data.email)) {
                showAlert('Please enter a valid email address', 'error');
                return false;
            }
            
            // Validate phone (Malawi format)
            const phoneRegex = /^(\+265|0)[1-9]\d{7,8}$/;
            if (!phoneRegex.test(data.phone)) {
                showAlert('Please enter a valid phone number (e.g., 0999123456 or +265999123456)', 'error');
                return false;
            }
            
            // Validate guarantor phones
            if (!phoneRegex.test(data.guarantor1Phone)) {
                showAlert('Please enter a valid phone number for Guarantor 1', 'error');
                return false;
            }
            
            if (!phoneRegex.test(data.guarantor2Phone)) {
                showAlert('Please enter a valid phone number for Guarantor 2', 'error');
                return false;
            }
            
            // Validate loan amount
            const loanAmount = parseFloat(data.loanAmount);
            if (loanAmount < 50000) {
                showAlert('Minimum loan amount is MWK 50,000', 'error');
                return false;
            }
            
            if (loanAmount > 10000000) {
                showAlert('Maximum loan amount is MWK 10,000,000', 'error');
                return false;
            }
            
            // Validate income vs expenses
            const income = parseFloat(data.monthlyIncome);
            const expenses = parseFloat(data.monthlyExpenses);
            
            if (expenses >= income) {
                showAlert('Monthly expenses must be less than monthly income', 'error');
                return false;
            }
            
            // Check affordability (loan payment shouldn't exceed 40% of income)
            const loanTerm = parseInt(data.loanTerm);
            const estimatedMonthlyPayment = (loanAmount * 1.2) / loanTerm; // Assuming 20% interest
            const maxPayment = income * 0.4;
            
            if (estimatedMonthlyPayment > maxPayment) {
                showAlert(`Warning: Estimated monthly payment (MWK ${Math.round(estimatedMonthlyPayment).toLocaleString()}) exceeds 40% of your income. Consider a smaller loan or longer term.`, 'info');
            }
            
            return true;
        }
        
        function resetForm() {
            form.reset();
            document.getElementById('existingLoans').value = 'No';
            document.getElementById('existingBalance').value = '';
        }
        
        async function submitToSheety(data) {
            console.log('📝 Submitting to Sheety:', data);
            
            // Sheety expects the data wrapped in the sheet name
            const payload = {};
            payload[SHEET_NAME] = data;
            
            try {
                const response = await fetch(SHEETY_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Sheety error response:', errorText);
                    throw new Error(`HTTP ${response.status}: ${errorText.substring(0, 200)}`);
                }
                
                const result = await response.json();
                console.log('Sheety success response:', result);
                return result;
                
            } catch (error) {
                console.error('Fetch error:', error);
                throw error;
            }
        }
        
        // Form submission handler
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();
            
            // Get and validate form data
            const formData = getFormData();
            
            if (!validateForm(formData)) {
                return;
            }
            
            // Disable submit button and show loading
            submitBtn.disabled = true;
            loadingDiv.classList.add('active');
            
            try {
                // Submit to Sheety
                const result = await submitToSheety(formData);
                
                console.log('✅ Submission successful:', result);
                
                // Show success message
                showAlert(`
                    ✅ <strong>Application Submitted Successfully!</strong><br><br>
                    Your Application ID: <strong>${formData.applicationId}</strong><br><br>
                    A confirmation email will be sent to ${formData.email}<br><br>
                    <strong>Please save your Application ID for future reference.</strong>
                `, 'success');
                
                // Reset form
                resetForm();
                
                // Scroll to top to show success message
                window.scrollTo({ top: 0, behavior: 'smooth' });
                
            } catch (error) {
                console.error('❌ Submission failed:', error);
                
                let errorMessage = error.message;
                if (error.message.includes('Failed to fetch')) {
                    errorMessage = 'Network error - Please check your internet connection and try again.';
                } else if (error.message.includes('401')) {
                    errorMessage = 'Authentication error - Please check your Sheety API URL.';
                } else if (error.message.includes('404')) {
                    errorMessage = 'API endpoint not found - Please verify your Sheety API URL.';
                }
                
                showAlert(`
                    ❌ <strong>Submission Failed</strong><br><br>
                    ${errorMessage}<br><br>
                    Please try again or contact support at ${EMAIL_ADMINS ? EMAIL_ADMINS[0] : 'the administrator'}.
                `, 'error');
            } finally {
                // Re-enable submit button and hide loading
                submitBtn.disabled = false;
                loadingDiv.classList.remove('active');
            }
        });
        
        // Add input validation for numeric fields
        document.getElementById('monthlyIncome').addEventListener('input', function() {
            if (this.value < 0) this.value = 0;
        });
        
        document.getElementById('monthlyExpenses').addEventListener('input', function() {
            if (this.value < 0) this.value = 0;
        });
        
        document.getElementById('loanAmount').addEventListener('input', function() {
            const amount = parseFloat(this.value);
            if (amount < 50000) {
                this.setCustomValidity('Minimum loan amount is MWK 50,000');
            } else if (amount > 10000000) {
                this.setCustomValidity('Maximum loan amount is MWK 10,000,000');
            } else {
                this.setCustomValidity('');
            }
        });
        
        // Phone number formatting hint
        function validatePhone(input) {
            const phone = input.value;
            const phoneRegex = /^(\+265|0)[1-9]\d{7,8}$/;
            if (phone && !phoneRegex.test(phone)) {
                input.setCustomValidity('Enter valid Malawi phone (e.g., 0999123456 or +265999123456)');
            } else {
                input.setCustomValidity('');
            }
        }
        
        document.getElementById('phone').addEventListener('input', function() { validatePhone(this); });
        document.getElementById('guarantor1Phone').addEventListener('input', function() { validatePhone(this); });
        document.getElementById('guarantor2Phone').addEventListener('input', function() { validatePhone(this); });
        
        console.log('✅ Ready - Sheety integration active');
        console.log('ℹ️ Free tier: 200 requests/month - Perfect for your usage');
    </script>
</body>
</html>
